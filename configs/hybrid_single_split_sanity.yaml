# ============================================
# Hybrid Single-Split Sanity Config (D-070+)
# ============================================
#
# This config is the shortest-path GPU sanity check for the repaired hybrid
# stack. It keeps the trusted single-split protocol fixed while switching only
# to the corrected hybrid model path and a VRAM-safer batch size.

# --- Model ---
model:
  type: "hybrid"
  in_channels: 1
  num_classes: 1
  base_filters: 64

# --- Foundation X ---
foundation_x:
  checkpoint_path: "checkpoints/foundation_x.pth"
  frozen: false

# --- Data ---
data:
  processed_dir: "data/processed/pneumothorax_trusted_v1"
  input_size: 512
  num_workers: 4
  train_mask_variant: "dilated_masks"
  eval_mask_variant: "original_masks"

# --- Training ---
training:
  epochs: 150
  batch_size: 4
  learning_rate: 0.0001
  optimizer: "AdamW"
  weight_decay: 0.01
  scheduler: "ReduceLROnPlateau"
  early_stopping_patience: 30

# --- Loss ---
loss:
  type: "dice_focal"

# --- Selection ---
selection:
  metric: "val_dice_pos_mean"
  threshold_candidates: [0.05, 0.10, 0.15, 0.20, 0.25, 0.30, 0.35, 0.40, 0.45, 0.50, 0.55, 0.60, 0.65, 0.70, 0.75, 0.80, 0.85, 0.90, 0.95]
  postprocess: "none"

# --- Explicit hybrid branch views ---
branch_input_views:
  dataset_emitted_view:
    space: "grayscale"
    value_range: "[0,1]"
    owner: "src/data/dataset.py"
  cnn_branch:
    source_view: "dataset_emitted_view"
    space: "grayscale"
    value_range: "[0,1]"
    transform: "identity"
    owner: "src/models/hybrid.py"
  foundation_x_branch:
    source_view: "dataset_emitted_view"
    space: "rgb"
    rgb_adapter: "repeat_grayscale_to_rgb"
    normalization:
      type: "imagenet_mean_std"
      mean: [0.485, 0.456, 0.406]
      std: [0.229, 0.224, 0.225]
    owner: "src/models/backbone.py"

# --- Other ---
seed: 42
device: "auto"
